name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  license-headers:
    name: license headers
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: korandoru/hawkeye@v6

  cargo-deny:
    name: cargo-deny
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  commit-messages:
    name: commit messages
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: pipx run gitlint --commits "origin/${{ github.base_ref || 'main' }}..HEAD"

  lint:
    name: fmt + clippy
    runs-on: ubuntu-24.04
    env:
      RUSTFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features

  # The caching machinery (fetch + fs2 advisory lock + cache-hit) is the
  # platform-sensitive part, so exercise it on every OS. Catalog freshness runs
  # on a schedule instead (freshness.yml).
  cache:
    name: cache (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-latest, windows-2025]
    runs-on: ${{ matrix.os }}
    env:
      RUSTFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Unit tests
        run: cargo test
      - name: Caching test (network)
        run: cargo test fetches_and_caches -- --ignored
